<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>shadow maker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>shadow maker</h1>
    <p class="sub">stack box-shadow layers and watch them update.</p>
  </header>

  <main class="grid">
    <section class="left">
      <div class="layers" id="layers"></div>
      <button class="add" id="addBtn">+ add shadow</button>
    </section>

    <section class="right">
      <div class="stage">
        <div class="card" id="preview">
          <h2>preview</h2>
          <p>some sample text inside the card so the shadow has something to sit under.</p>
        </div>
      </div>

      <div class="output">
        <pre id="cssOut"><code>box-shadow: none;</code></pre>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
